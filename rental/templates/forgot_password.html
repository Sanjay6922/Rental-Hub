{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | RentalHub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Background Animation */

.bg-animation{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(59,130,246,.12);
    animation:float 12s linear infinite;
}

.circle:nth-child(1){
    width:320px;
    height:320px;
    left:-120px;
    top:80px;
}

.circle:nth-child(2){
    width:250px;
    height:250px;
    right:-80px;
    bottom:80px;
    animation-duration:15s;
}

.circle:nth-child(3){
    width:180px;
    height:180px;
    left:45%;
    bottom:-70px;
    animation-duration:18s;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0);
}

50%{
transform:translateY(-40px) rotate(180deg);
}

100%{
transform:translateY(0) rotate(360deg);
}

}

/* Card */

.card{

width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
padding:45px;
border-radius:25px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 25px 50px rgba(0,0,0,.35);

}

.icon{

width:90px;
height:90px;
margin:auto;
background:linear-gradient(135deg,#2563eb,#3b82f6);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:36px;
margin-bottom:25px;

}

h2{

text-align:center;
color:white;
margin-bottom:12px;
font-size:30px;

}

.subtitle{

text-align:center;
color:#94a3b8;
margin-bottom:35px;
line-height:1.7;
font-size:15px;

}

.input-group{

margin-bottom:25px;

}

label{

display:block;
margin-bottom:10px;
color:#cbd5e1;
font-size:15px;

}

.input-box{

position:relative;

}

.input-box i{

position:absolute;
left:18px;
top:18px;
color:#94a3b8;

}

.input-box input{

width:100%;
padding:16px 18px 16px 48px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.05);
color:white;
font-size:15px;
transition:.3s;

}

.input-box input::placeholder{

color:#64748b;

}

.input-box input:focus{

border:1px solid #3b82f6;
box-shadow:0 0 0 4px rgba(59,130,246,.15);

}

button{

width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 15px 30px rgba(37,99,235,.35);

}

.back{

margin-top:25px;
text-align:center;

}

.back a{

text-decoration:none;
color:#60a5fa;
font-weight:500;

}

.back a:hover{

text-decoration:underline;

}

/* Alerts */

.alert-error{

background:rgba(239,68,68,.15);
border:1px solid rgba(239,68,68,.35);
padding:12px;
border-radius:10px;
color:#fecaca;
margin-bottom:20px;
text-align:center;

}

.alert-success{

background:rgba(34,197,94,.15);
border:1px solid rgba(34,197,94,.35);
padding:12px;
border-radius:10px;
color:#bbf7d0;
margin-bottom:20px;
text-align:center;

}

</style>

</head>

<body>

<div class="bg-animation">

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

</div>

<div class="card">

<div class="icon">
<i class="fa-solid fa-lock"></i>
</div>

<h2>Forgot Password</h2>

<p class="subtitle">
Enter your registered email address.
We'll send a One-Time Password (OTP) to reset your password.
</p>

{% if error %}
<div class="alert-error">
{{ error }}
</div>
{% endif %}

{% if success %}
<div class="alert-success">
{{ success }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
name="email"
placeholder="Enter your registered email"
required>

</div>

</div>

<button type="submit">

<i class="fa-solid fa-paper-plane"></i>

Send OTP

</button>

</form>

<div class="back">

<a href="{% url 'home' %}">

<i class="fa-solid fa-arrow-left"></i>

Back to Login

</a>

</div>

</div>

</body>
</html>
