<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    width: 380px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    animation: fadeIn 0.6s ease;
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1f4037;
}

/* Input group */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-size: 13px;
    color: #444;
}

.input-group input {
    width: 100%;
    padding: 11px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #1f4037;
    outline: none;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    background: #1f4037;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #145c4f;
}

/* Links */
.links {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.links a {
    color: #1f4037;
    text-decoration: none;
    font-weight: bold;
}

.links a:hover {
    text-decoration: underline;
}

/* Error message */
.error {
    color: red;
    font-size: 13px;
    text-align: center;
    margin-bottom: 10px;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="container">
    <h2>Login</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action ="log">
        {% csrf_token %}

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="links">
            Don’t have an account? 
            <a href="userreg">Register</a>
        </div>
    </form>
</div>

</body>
</html>
