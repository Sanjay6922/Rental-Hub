{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Admin</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #0f172a;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .contact-container {
        width: 100%;
        max-width: 700px;
      }

      .contact-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .contact-card h1 {
        text-align: center;
        color: #fff;
        margin-bottom: 10px;
      }

      .contact-card p {
        text-align: center;
        color: #cbd5e1;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        color: white;
        margin-bottom: 8px;
        font-size: 14px;
      }

      input,
      textarea {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        outline: none;
      }

      textarea {
        min-height: 150px;
        resize: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: #94a3b8;
      }

      .btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      .success {
        background: #16a34a;
        color: white;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .modal-content {
        background: white;
        padding: 35px;
        border-radius: 20px;
        text-align: center;
        width: 350px;
        animation: popup 0.3s ease;
      }

      .success-icon {
        width: 70px;
        height: 70px;
        margin: auto;
        border-radius: 50%;
        background: #22c55e;
        color: white;
        font-size: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
      }

      .modal-content h2 {
        color: #0f172a;
        margin-bottom: 10px;
      }

      .modal-content p {
        color: #64748b;
        margin-bottom: 20px;
      }

      .modal-content button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        cursor: pointer;
      }

      @keyframes popup {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="contact-container">
      <div class="contact-card">
        <h1>Contact Admin</h1>
        <p>Have a question or issue? Send us a message.</p>

        {% if success %}
        <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="form-group">
            <label>Name</label>
            <input type="text" value="{{ user.name }}" readonly />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" value="{{ user.email }}" readonly />
          </div>

          <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" required />
          </div>

          <div class="form-group">
            <label>Message</label>
            <textarea name="message" required></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </div>
    {% if message_sent %}
    <div id="successModal" class="modal">
      <div class="modal-content">
        <div class="success-icon">✓</div>
        <h2>Message Sent!</h2>
        <p>Your message has been successfully sent to the admin.</p>
        <button onclick="closeModal()">OK</button>
      </div>
    </div>
    {% endif %}
    <script>
      function closeModal() {
        document.getElementById("successModal").style.display = "none";
        window.location.href = "{% url 'profile' %}";
      }
    </script>
  </body>
</html>
