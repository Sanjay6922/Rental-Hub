{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reply Message</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f172a;
            color:#fff;
        }

        .container{
            max-width:750px;
            margin:60px auto;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(15px);
            padding:35px;
            border-radius:20px;
            border:1px solid rgba(255,255,255,.08);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

        .box{
            background:rgba(255,255,255,.05);
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        textarea{
            width:100%;
            height:180px;
            resize:none;
            padding:15px;
            border:none;
            border-radius:10px;
            outline:none;
            background:#1e293b;
            color:white;
            font-size:15px;
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            margin-top:20px;
            cursor:pointer;
            font-size:16px;
            font-weight:600;
            color:white;
            background:linear-gradient(135deg,#2563eb,#3b82f6);
        }

        .btn:hover{
            opacity:.9;
        }

        strong{
            color:#60a5fa;
        }

        p{
            line-height:1.8;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Reply to User</h2>

    <div class="box">
        <p><strong>Name :</strong> {{ contact.name }}</p>
        <p><strong>Email :</strong> {{ contact.email }}</p>
    </div>

    <div class="box">
        <strong>User Message</strong>
        <p>{{ contact.message }}</p>
    </div>

    <form method="POST">

        {% csrf_token %}

        <label>Reply</label>

        <textarea name="reply" placeholder="Write your reply here...">{{ contact.reply }}</textarea>

        <button type="submit" class="btn">
            Send Reply
        </button>

    </form>

</div>

</body>
</html>
